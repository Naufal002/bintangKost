<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Registration or Sign Up form in HTML CSS | CodingLab </title> 
    <link rel="stylesheet" href="css/tambah_datakamar.css">
   </head>
<body>
  <div class="wrapper">
    <h2>Tambah data kamar</h2>
    <form action="#">
      <div class="input-box">
        <input type="text" placeholder="Nama kamar" required>
      </div>
      <div class="input-box">
        <input type="text" placeholder="kategori" required>
      </div>
      <div class="input-box">
        <input type="password" placeholder="deskripsi" required>
      </div>
      <div class="input-box">
        <input type="password" placeholder="fasilitas" required>
      </div>
      <div class="input-box">
        <input type="file" placeholder="gambar" required>
    </div>
      <div class="policy">
        <input type="checkbox">
        <h3>I accept all terms & condition</h3>
      </div>
      <div class="input-box button">
        <input type="Submit" value="Tambah kamar">
      </div>
    </form>
  </div>
</body>
</html>
